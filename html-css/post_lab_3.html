<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>
</head>

<body style="background-color:blanchedalmond; font-family:Arial;">

<div style="width:80%; margin:auto; padding:30px;">

<h2 align="center">Student Registration Form</h2>

<form>

<table align="center" cellspacing="12" cellpadding="10">

<tr>
<td>Roll no. :</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Student name :</td>
<td>
<input type="text" placeholder="First Name">
-
<input type="text" placeholder="Last Name">
</td>
</tr>

<tr>
<td>Father's name :</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Date of birth :</td>
<td>
<input type="text" placeholder="Day" size="4">
-
<input type="text" placeholder="Month" size="4">
-
<input type="text" placeholder="Year" size="6">
(DD-MM-YYYY)
</td>
</tr>

<tr>
<td>Mobile no. :</td>
<td>
<input type="text" value="+91" size="3">
-
<input type="text">
</td>
</tr>

<tr>
<td>Email id :</td>
<td><input type="email"></td>
</tr>

<tr>
<td>Password :</td>
<td><input type="password"></td>
</tr>

<tr>
<td>Gender :</td>
<td>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</td>
</tr>

<tr>
<td>Department :</td>
<td>
<input type="checkbox"> CSE
<input type="checkbox"> IT
<input type="checkbox"> ECE
<input type="checkbox"> Civil
<input type="checkbox"> Mech
</td>
</tr>

<tr>
<td>Course :</td>
<td>
<select>
<option>----------- Select Current Course's -----------</option>
<option>B.Tech</option>
<option>M.Tech</option>
<option>BCA</option>
<option>MCA</option>
<option>B.Sc</option>
<option>M.Sc</option>
<option>MBA</option>
<option>BBA</option>
<option>Ph.D</option>
</select>
</td>
</tr>

<tr>
<td>Student photo :</td>
<td><input type="file"></td>
</tr>

<tr>
<td>City :</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Address :</td>
<td><textarea rows="4" cols="35"></textarea></td>
</tr>

</table>

<div align="center" style="margin-top:15px;">
<button type="submit">Register</button>
</div>

</form>

</div>

</body>
</html>
