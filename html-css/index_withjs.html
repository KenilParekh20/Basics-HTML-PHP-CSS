 <body>
    <input type = 'text' placeholder="enter anythings..." id='txtmyInput'>
    <button type ="button" onclick ="myfun()"> click me</button>
    <p id="doubleNum"></p>

    <script>
        function myfun() {
            let inp = document.getElementById('txtmyInput')
            console.log('button clicked',inp.value)
            let para = document.getElementById('doubleNum')
            para.innerText = inp.value * 2
            let html = ''
            let num = inp.value
            for(var i=1;i<11;i++) {
                html += '<p>' + num + ' x ' + i + ' = ' + (num * i) + '</p>'
            }
            para.innerHTML = html
        }
    </script>
