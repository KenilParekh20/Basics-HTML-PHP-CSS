<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Effect</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            background-color: yellow;
            transition: all 0.3s ease;
        }

        .box:hover {
            width: 400px;
            height: 400px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="box"><h3>Kenil Parekh</h3></div>
</body>
</html>
