<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="btndiv">
        <button type="button" id="btnAdd" onclick="onAdd()">Add</button>
        <button type="button" id="btnCalc" onclick="onCalc()">Calculate</button>
    </div>
    <div id="my_input">
        <input type="text" placeholder="Enter product Name" id="prod_1">
        <input type="number" onchange="calc('1')" placeholder="Enter Qty" id="qty_1">
        <input type="number" onchange="calc('1')" placeholder="Enter Rate" id="rate_1">
        <input type="number" id="amount_1" readonly>
    </div>
    <div id="total">Total:0</div>
    <script>
        let count = 1;
        function onAdd() {
            count++;
            let html = '<br/><input type="text" placeholder="Enter product Name" id="prod_' + count + '">' +
                '<input type="number"  onchange="calc(' + count + ')" placeholder="Enter Qty" id="qty_' + count + '">' +
                '<input type="number"  onchange="calc(' + count + ')" placeholder="Enter Rate" id="rate_' + count + '">' +
                '<input type="number" id="amount_' + count + '" readonly>';
            document.getElementById('my_input').innerHTML += html;
        }
        function calc(id) {
            console.log(id);
            let qty = parseFloat(document.getElementById('qty_' + id).value);
            let rate = parseFloat(document.getElementById('rate_' + id).value);
            document.getElementById('amount_' + id).value = qty * rate;
            onCalc();
        }
        function onCalc() {
            let sum = 0;
            for (i = 1; i <= count; i++) {
                sum += parseFloat(document.getElementById('amount_' + i).value)
            }
            document.getElementById('total').innerHTML = 'Total:' + sum
        }
    </script>
</body>

</html>
