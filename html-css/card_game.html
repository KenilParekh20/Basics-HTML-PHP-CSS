<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Battle Memory Game</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#000428,#004e92);
  color:white;
  text-align:center;
}

h1 { margin:15px; }

#game {
  display:grid;
  gap:10px;
  width:90%;
  max-width:500px;
  margin:20px auto;
}

.card {
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  transform-style: preserve-3d;
  transition: transform 0.6s;
  cursor:pointer;
}

.card.flip { transform: rotateY(180deg); }
.card.matched { visibility:hidden; }

.front, .back {
  position:absolute;
  width:100%; height:100%;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
}

/* FRONT = hidden side */
.front {
  background:#111;
  font-size:22px;
}

/* BACK = actual image */
.back {
  background:#fff;
  transform: rotateY(180deg);
  font-size:30px;
}

#topbar { display:flex; justify-content:center; gap:20px; }
#message { font-size:22px; margin-top:10px; }

.effect {
  position:absolute;
  font-size:30px;
  animation: blast 0.6s ease;
}

@keyframes blast {
  0% { transform: scale(0.5); opacity:1; }
  100% { transform: scale(2); opacity:0; }
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🔥 Anime Battle Memory Game</h1>

<div id="topbar">
  <div>⏱ Time: <span id="time">0</span></div>
  <div>⭐ Score: <span id="score">0</span></div>
  <div>🔓 Level: <span id="level">1</span></div>
</div>

<div id="game"></div>
<div id="message"></div>
<button id="restart">Restart</button>

<script>
$(function(){

let levels=[4,6,8];
let currentLevel=0;
let size=levels[currentLevel];

let first=null, second=null, lock=false;
let matches=0, totalPairs=0;
let score=0, timer=0, interval;

// Naruto + Dragon Ball themed icons
const animeIcons=[
 '🦊','👁️','🔥','⚡','🐉','💥','🌪️','🌀','👊','💫','🌙','🔴','🟠','🟡','🔵','🟣'
];

function startTimer(){
  clearInterval(interval);
  timer=0;
  interval=setInterval(()=>{
    timer++;
    $('#time').text(timer);
  },1000);
}

function initGrid(){
  $('#game').css('grid-template-columns',`repeat(${size},1fr)`);
  totalPairs=(size*size)/2;

  let icons=[...animeIcons.slice(0,totalPairs),...animeIcons.slice(0,totalPairs)];
  icons.sort(()=>0.5-Math.random());

  $('#game').empty();
  matches=0;
  startTimer();

  icons.forEach(val=>{
    let card=$(`
      <div class="card" data-val="${val}">
        <div class="front">❓</div>
        <div class="back">${val}</div>
      </div>`);
    $('#game').append(card);
  });
}

function nextLevel(){
  if(currentLevel < levels.length-1){
    currentLevel++;
    size=levels[currentLevel];
    $('#level').text(currentLevel+1);
    $('#message').text('⚡ Power Up! Next Level Unlocked!');
    setTimeout(initGrid,1500);
  } else {
    clearInterval(interval);
    $('#message').html('🏆 Ultimate Victory! All Levels Completed!');
  }
}

$('#game').on('click','.card',function(){
  if(lock || $(this).hasClass('flip')) return;

  $(this).addClass('flip');

  if(!first){ first=$(this); }
  else {
    second=$(this);
    lock=true;

    if(first.data('val')===second.data('val')){
      score+=10;
      matches++;
      $('#score').text(score);

      // attack animation
      let effect=$('<div class="effect">💥</div>');
      $(this).append(effect);

      setTimeout(()=>{
        first.addClass('matched');
        second.addClass('matched');
      },400);

      first=null; second=null; lock=false;

      if(matches===totalPairs){
        setTimeout(nextLevel,800);
      }

    } else {
      setTimeout(()=>{
        first.removeClass('flip');
        second.removeClass('flip');
        first=null; second=null; lock=false;
      },800);
    }
  }
});

$('#restart').click(()=>{
  currentLevel=0;
  size=levels[currentLevel];
  score=0;
  $('#score').text(score);
  $('#level').text(1);
  $('#message').text('');
  initGrid();
});

initGrid();

});
</script>

</body>
</html>
