<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App - IWT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.quiz-box{background:#fff;border-radius:16px;padding:36px;max-width:600px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.4)}
h1{text-align:center;color:#0f3460;margin-bottom:6px;font-size:1.8rem}
.subtitle{text-align:center;color:#888;font-size:.9rem;margin-bottom:24px}
.progress-bar-bg{background:#e0e0e0;border-radius:10px;height:8px;margin-bottom:20px;overflow:hidden}
.progress-bar{height:8px;background:linear-gradient(90deg,#0f3460,#e94560);border-radius:10px;transition:width .4s ease}
.q-info{display:flex;justify-content:space-between;margin-bottom:10px;font-size:.85rem;color:#666}
.question{font-size:1.15rem;font-weight:bold;color:#222;margin-bottom:20px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.option-btn{background:#f5f7fa;border:2px solid #dde1e7;border-radius:10px;padding:12px 16px;font-size:.95rem;text-align:left;cursor:pointer;transition:all .2s}
.option-btn:hover:not(:disabled){background:#e8f0fe;border-color:#0f3460}
.option-btn.correct{background:#d5f5e3;border-color:#27ae60;color:#1a7a40}
.option-btn.wrong{background:#fde8e8;border-color:#e74c3c;color:#a93226}
.explanation{margin-top:14px;padding:10px 14px;background:#eaf4fb;border-left:4px solid #3498db;border-radius:6px;font-size:.88rem;color:#555;display:none}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:22px}
.next-btn{background:#0f3460;color:#fff;border:none;padding:11px 28px;border-radius:8px;font-size:1rem;cursor:pointer;transition:background .2s;display:none}
.next-btn:hover{background:#e94560}
.score-display{font-size:.95rem;color:#555;font-weight:bold}
.result-screen{text-align:center;display:none}
.result-screen h2{font-size:2rem;color:#0f3460;margin-bottom:10px}
.big-score{font-size:4rem;font-weight:bold;color:#e94560;margin:16px 0}
.result-msg{color:#555;font-size:1rem;margin-bottom:24px}
.restart-btn{background:linear-gradient(90deg,#0f3460,#e94560);color:#fff;border:none;padding:13px 36px;border-radius:30px;font-size:1rem;cursor:pointer;font-weight:bold}
.restart-btn:hover{opacity:.88}
</style>
</head>
<body>
<div class="quiz-box">
<div id="quiz-section">
<h1>Web Technology Quiz</h1>
<p class="subtitle">Internet & Web Technology (IWT) – 01CT408</p>
<div class="progress-bar-bg"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
<div class="q-info"><span id="q-counter">Question 1 / 10</span><span id="score-live">Score: 0</span></div>
<div class="question" id="question-text">Loading...</div>
<div class="options" id="options-container"></div>
<div class="explanation" id="explanation"></div>
<div class="nav-row"><span class="score-display" id="result-label"></span><button class="next-btn" id="next-btn" onclick="nextQuestion()">Next ▶</button></div>
</div>
<div class="result-screen" id="result-screen">
<h2>Quiz Completed! 🎉</h2>
<div class="big-score" id="final-score">0/10</div>
<p class="result-msg" id="result-msg">Great effort!</p>
<button class="restart-btn" onclick="restartQuiz()">Restart Quiz</button>
</div>
</div>
<script>
const questions=[{q:"What does HTML stand for?",options:["HyperText Markup Language","HyperText Machine Language","HighText Markup Language","HyperTool Markup Language"],answer:0,exp:"HTML = HyperText Markup Language. It is the standard language for creating web pages."},{q:"Which HTML tag is used to create a hyperlink?",options:["<link>","<a>","<href>","<url>"],answer:1,exp:"The <a> (anchor) tag with the href attribute is used to create hyperlinks in HTML."},{q:"What does CSS stand for?",options:["Computer Style Sheet","Creative Style System","Cascading Style Sheets","Colorful Style Sheet"],answer:2,exp:"CSS = Cascading Style Sheets. It controls the look and layout of web pages."},{q:"Which property is used to change text color in CSS?",options:["text-color","font-color","color","background-color"],answer:2,exp:"The 'color' property in CSS is used to set the foreground color of text."},{q:"What does PHP stand for?",options:["Personal Home Page","PHP: Hypertext Preprocessor","Private Hypertext Page","Public Home Processor"],answer:1,exp:"PHP originally stood for Personal Home Page, but now stands for PHP: Hypertext Preprocessor."},{q:"Which tag is used to insert JavaScript in HTML?",options:["<js>","<code>","<script>","<javascript>"],answer:2,exp:"The <script> tag is used to embed or reference JavaScript code in an HTML document."},{q:"In JavaScript, which method selects an element by its ID?",options:["getElement(id)","querySelector(id)","getElementById(id)","selectById(id)"],answer:2,exp:"document.getElementById('id') is the standard DOM method to select an element by its ID."},{q:"What does HTTP stand for?",options:["HyperText Transfer Protocol","HyperText Tool Protocol","HyperText Transmission Process","High Transfer Text Protocol"],answer:0,exp:"HTTP = HyperText Transfer Protocol. It is the foundation of data communication on the web."},{q:"Which SQL command is used to retrieve data from a database?",options:["GET","FETCH","SELECT","RETRIEVE"],answer:2,exp:"The SELECT statement is used to query and retrieve data from a MySQL/SQL database."},{q:"Which CSS property controls the space between elements?",options:["spacing","margin","padding","border"],answer:1,exp:"margin controls the space OUTSIDE an element. padding controls space INSIDE. margin is used to create space between elements."}];
let currentQ=0,score=0,answered=false;
function loadQuestion(){
const q=questions[currentQ];
document.getElementById('q-counter').textContent=`Question ${currentQ+1} / ${questions.length}`;
document.getElementById('score-live').textContent=`Score: ${score}`;
document.getElementById('question-text').textContent=q.q;
document.getElementById('explanation').style.display='none';
document.getElementById('next-btn').style.display='none';
document.getElementById('result-label').textContent='';
answered=false;
document.getElementById('progress-bar').style.width=((currentQ)/questions.length*100)+'%';
const container=document.getElementById('options-container');
container.innerHTML='';
q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=opt;btn.onclick=()=>selectAnswer(i);container.appendChild(btn);});
}
function selectAnswer(selected){
if(answered)return;
answered=true;
const q=questions[currentQ];
const buttons=document.querySelectorAll('.option-btn');
buttons.forEach((btn,i)=>{btn.disabled=true;if(i===q.answer)btn.classList.add('correct');else if(i===selected)btn.classList.add('wrong');});
if(selected===q.answer){score++;document.getElementById('result-label').textContent='Correct!';}
else{document.getElementById('result-label').textContent=' Wrong!';}
document.getElementById('explanation').textContent=''+q.exp;
document.getElementById('explanation').style.display='block';
document.getElementById('next-btn').style.display='block';
document.getElementById('score-live').textContent=`Score: ${score}`;
}
function nextQuestion(){currentQ++;if(currentQ<questions.length)loadQuestion();else showResult();}
function showResult(){
document.getElementById('quiz-section').style.display='none';
document.getElementById('result-screen').style.display='block';
document.getElementById('final-score').textContent=`${score} / ${questions.length}`;
const pct=score/questions.length;
let msg=pct===1?" Perfect score! Excellent work!":pct>=.8?" Great job! You know your web tech!":pct>=.5?" Good effort! Review the topics and try again!":"Keep studying! You'll do better next time!";
document.getElementById('result-msg').textContent=msg;
document.getElementById('progress-bar').style.width='100%';
}
function restartQuiz(){currentQ=0;score=0;document.getElementById('quiz-section').style.display='block';document.getElementById('result-screen').style.display='none';loadQuestion();}
loadQuestion();
</script>
</body>
</html>
